        // --- Audio Logic Helper ---
        class AudioManager {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.envGain = null;

                this.oscL = null;
                this.oscR = null;
                this.cameraNoiseNode = null; // For pink/brown noise

                // 環境音ファイル再生 (HTMLMediaElement独立再生方式)
                this.envFileElement = null; // <audio>要素
                this._envFileBlobUrl = null; // Blobから生成したObject URL（廃棄用）
                this._currentEnvVol = undefined; // 音量保持用
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

                    // Master Gain (Binaural)
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.connect(this.ctx.destination);

                    // Environment Gain (Noise)
                    this.envGain = this.ctx.createGain();
                    this.envGain.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            // AudioContextがsuspendedになった場合に再開する（バックグラウンド復帰時用）
            ensureContextRunning() {
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume().catch(() => {});
                }
            }

            setBinaural(carrier, diff) {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;

                // If oscillators exist and are running, update frequency smoothly
                if (this.oscL && this.oscR) {
                    try {
                        this.oscL.frequency.setTargetAtTime(carrier, now, 0.1);
                        this.oscR.frequency.setTargetAtTime(carrier + diff, now, 0.1);
                        return;
                    } catch (e) {
                        // Fallback if stale
                    }
                }

                // Create new oscillators (First run or after stop)
                // Left
                this.oscL = this.ctx.createOscillator();
                this.oscL.type = 'sine';
                this.oscL.frequency.setValueAtTime(carrier, now);
                const panL = this.ctx.createStereoPanner();
                panL.pan.value = -1;
                this.oscL.connect(panL).connect(this.masterGain);

                // Right
                this.oscR = this.ctx.createOscillator();
                this.oscR.type = 'sine';
                this.oscR.frequency.setValueAtTime(carrier + diff, now);
                const panR = this.ctx.createStereoPanner();
                panR.pan.value = 1;
                this.oscR.connect(panR).connect(this.masterGain);

                this.oscL.start();
                this.oscR.start();
            }

            startNoise(type = 'pink') {
                if (!this.ctx) return;
                this.stopNoise();

                const bufferSize = 2 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = buffer.getChannelData(0);

                // Generate Pink Noise
                if (type === 'pink') {
                    let b0, b1, b2, b3, b4, b5, b6;
                    b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
                    // [MEDIUM-5修正] Math.random() → crypto.getRandomValues() へ変更
                    const randBuf = new Uint32Array(bufferSize);
                    crypto.getRandomValues(randBuf);
                    for (let i = 0; i < bufferSize; i++) {
                        const white = (randBuf[i] / 0xFFFFFFFF) * 2 - 1;
                        b0 = 0.99886 * b0 + white * 0.0555179;
                        b1 = 0.99332 * b1 + white * 0.0750759;
                        b2 = 0.96900 * b2 + white * 0.1538520;
                        b3 = 0.86650 * b3 + white * 0.3104856;
                        b4 = 0.55000 * b4 + white * 0.5329522;
                        b5 = -0.7616 * b5 - white * 0.0168980;
                        output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                        output[i] *= 0.11; // (roughly) compensate for gain
                        b6 = white * 0.115926;
                    }
                }
                // Generate Brown Noise
                else {
                    let lastOut = 0.0;
                    // [MEDIUM-5修正] Math.random() → crypto.getRandomValues() へ変更
                    const randBuf2 = new Uint32Array(bufferSize);
                    crypto.getRandomValues(randBuf2);
                    for (let i = 0; i < bufferSize; i++) {
                        const white = (randBuf2[i] / 0xFFFFFFFF) * 2 - 1;
                        output[i] = (lastOut + (0.02 * white)) / 1.02;
                        lastOut = output[i];
                        output[i] *= 3.5; // (roughly) compensate for gain
                    }
                }

                this.cameraNoiseNode = this.ctx.createBufferSource();
                this.cameraNoiseNode.buffer = buffer;
                this.cameraNoiseNode.loop = true;
                this.cameraNoiseNode.connect(this.envGain);
                this.cameraNoiseNode.start();

                }
                if (this.oscR) {
                    try { this.oscR.stop(); } catch (e) { }
                    try { this.oscR.disconnect(); } catch (e) { }

                }

            setVolumes(masterVol, envVol, fade = false) {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;

                // Volume Scaling
                const normMaster = masterVol / 100;
                const actualMaster = Math.pow(normMaster, 2) * 0.1;

                if (this.masterGain) {

                    audio.addEventListener('pause', () => {

                    this.ctx = null;
                }
            }

                                this.masterGain.gain.setTargetAtTime(0, now, 0.1);
                            } catch (e) { }
                        } else {

                        }

                        try { this.envGain.gain.setTargetAtTime(0, now, 0.1); } catch (e) { }
                    } else {
                        try { this.envGain.gain.setTargetAtTime(envVol / 100, now, 0.5); } catch (e) { }

        // --- IndexedDB: 環境音ファイルの永続化 ---
        // localStorageはファイル（Blobバイナリ）を保存できないため、IndexedDBを使用する
        const AudioFileDB = (() => {
            const DB_NAME = 'GammaBoosterAudio';
            const STORE = 'envFiles';
            const VERSION = 1;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, VERSION);
                    req.onupgradeneeded = e => {
                        e.target.result.createObjectStore(STORE);
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            }

            async function withDB(mode, fn) {
                const db = await openDB();
                try {
                    return await new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE, mode);
                        tx.onerror = e => reject(e.target.error);
                        fn(tx.objectStore(STORE), resolve, reject);
                    });
                } finally {
                    db.close();
                }
            }

            return {
                // Blob + ファイル名を保存
                save(key, blob, name) {
                    return withDB('readwrite', (store, resolve, reject) => {
                        const req = store.put({ blob, name }, key);
                        req.onsuccess = resolve;
                        req.onerror = e => reject(e.target.error);
                    }).catch(e => console.error('AudioFileDB.save:', e));
                },
                // 1エントリブ読み込み
                load(key) {
                    return withDB('readonly', (store, resolve, reject) => {
                        const req = store.get(key);
                        req.onsuccess = e => resolve(e.target.result || null);
                        req.onerror = e => reject(e.target.error);
                    }).catch(e => { console.error('AudioFileDB.load:', e); return null; });
                },
                // 複数エントリを一括読み込み
                async loadAll(keys) {
                    const results = {};
                    await Promise.all(keys.map(async key => {
                        results[key] = await this.load(key);
                    }));
                    return results;
                },
                // エントリ削除
                delete(key) {
                    return withDB('readwrite', (store, resolve, reject) => {
                        const req = store.delete(key);
                        req.onsuccess = resolve;
                        req.onerror = e => reject(e.target.error);
                    }).catch(e => console.error('AudioFileDB.delete:', e));
                },
            };
        })();

                return Math.max(min, Math.min(max, Math.round(num)));

                        if (config.envVol !== undefined) setEnvVol(sanitizeNumber(config.envVol, 0, 100, 20));

                    default: return "";
                }
            };

            // Toast notification state
            const [toastMsg, setToastMsg] = useState('');
            const toastTimer = useRef(null);
            const showToast = (msg) => {
                setToastMsg(msg);
                if (toastTimer.current) clearTimeout(toastTimer.current);
                toastTimer.current = setTimeout(() => setToastMsg(''), 2200);
            };

            // ─── 自動保存（state 変化時）───
            // currentConfigRef を常に最新値に保ち、localStorageにも書き込む
            // ノイジーな「設定を保存しました」トーストは廃止（終了保存・起動復元で十分）
            useEffect(() => {
                if (!loadCompleteRef.current) return; // ロード完了前は保存しない

                const config = { masterVol, envVol, duration, selectedEnv, currentModeId: currentMode.id };
                currentConfigRef.current = config; // refを最新値に更新
                try {
                    localStorage.setItem('gamma_config', JSON.stringify(config));
                } catch (e) { /* QuotaExceededError 等は無視 */ }
            }, [masterVol, envVol, duration, selectedEnv, currentMode]);

            // Export settings as JSON file for backup
            const exportSettings = () => {
                const config = {
                    masterVol, envVol, duration, selectedEnv, currentModeId: currentMode.id,
                    _app: 'GammaWaveBooster',
                    _version: 1,
                    _exportedAt: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `gamma_booster_settings_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('📦 バックアップを保存しました');
            };

            // Import settings from JSON file (サニタイズ済み)
            // iOS Safari対策: FileオブジェクトをArrayBufferとしてコピーし、
            // 非同期処理中にFileオブジェクトが無効化されても安全に処理できるよう改善
            const importSettings = (file) => {
                if (!file) {
                    showToast('⚠️ ファイルを選択してください');
                    return;
                }

                // ファイルサイズチェック（1MB上限）
                if (file.size > 1024 * 1024) {
                    showToast('⚠️ ファイルが大きすぎます（1MB以下）');
                    return;
                }

                // ファイル名チェック（.json拡張子確認）
                if (!file.name.toLowerCase().endsWith('.json')) {
                    showToast('⚠️ JSONファイルを選択してください');
                    return;
                }

                const reader = new FileReader();

                reader.onload = (e) => {
                    try {
                        const text = e.target.result;
                        if (!text || typeof text !== 'string') {
                            showToast('⚠️ ファイルの読み込みに失敗しました');
                            return;
                        }

                        const config = JSON.parse(text);

                        if (typeof config !== 'object' || config === null) {
                            showToast('⚠️ 無効なファイル形式です');
                            return;
                        }
                        if (config._app !== 'GammaWaveBooster') {
                            showToast('⚠️ このアプリのバックアップファイルではありません');
                            return;
                        }

                        // サニタイズして適用
                        const newMasterVol = config.masterVol !== undefined
                            ? sanitizeNumber(config.masterVol, 0, 100, 20) : 20;
                        const newEnvVol = config.envVol !== undefined
                            ? sanitizeNumber(config.envVol, 0, 100, 20) : 20;
                        const newDuration = config.duration
                            ? sanitizeNumber(config.duration, 60, 7200, 3600) : 3600;
                        const newSelectedEnv = config.selectedEnv
                            ? sanitizeString(config.selectedEnv, allowedEnvIds, 'none') : 'none';

                        let newMode = null;
                        if (config.currentModeId) {
                            const safeId = sanitizeString(config.currentModeId, allowedModeIds, null);
                            if (safeId) newMode = MODES.find(m => m.id === safeId) || null;
                        }

                        // React stateへ反映
                        setMasterVol(newMasterVol);
                        setEnvVol(newEnvVol);
                        setDuration(newDuration);
                        setSelectedEnv(newSelectedEnv);
                        if (newMode) setCurrentMode(newMode);

                        // localStorageへ即時書き込み（useEffectの遅延を待たずに確実に保存）
                        const savedConfig = {
                            masterVol: newMasterVol,
                            envVol: newEnvVol,
                            duration: newDuration,
                            selectedEnv: newSelectedEnv,
                            currentModeId: newMode ? newMode.id : (config.currentModeId || MODES[0].id)
                        };
                        localStorage.setItem('gamma_config', JSON.stringify(savedConfig));

                        const exportedAt = config._exportedAt
                            ? new Date(config._exportedAt).toLocaleDateString('ja-JP')
                            : '';
                        showToast(`✅ 設定を復元しました${exportedAt ? ` (${exportedAt}のデータ)` : ''}`);

                    } catch (err) {
                        console.error('Import error:', err);
                        if (err instanceof SyntaxError) {
                            showToast('⚠️ ファイルが壊れています（JSON形式エラー）');
                        } else {
                            showToast('⚠️ 復元に失敗しました');
                        }
                    }
                };

                reader.onerror = () => {
                    showToast('⚠️ ファイルの読み取りに失敗しました');
                };

                // エンコーディング明示（スマホ環境でのUTF-8対応）
                reader.readAsText(file, 'UTF-8');
            };

            // Format Time
            const formatTime = (sec) => {
                const m = Math.floor(sec / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // Get frequency label for display
            const getFreqLabel = () => {
                if (currentMode.target === 'variable') {
                    return isPlaying ? `${CARRIER_FREQ}Hz ± 変動中` : '自動変動モード';
                }
                return `${CARRIER_FREQ}Hz + ${currentMode.target}Hz`;
            };

            // Settings Modal State
            const [showSettings, setShowSettings] = useState(false);
            const importFileRef = useRef(null);
            const [selectedGroup, setSelectedGroup] = useState(MODE_GROUPS[0].id);

            // Get modes for the currently selected group (plain calculation, not useMemo)
            const currentGroupModes = (() => {
                const group = MODE_GROUPS.find(g => g.id === selectedGroup);
                return group ? group.modes : MODE_GROUPS[0].modes;
            })();

            // Auto-sync group tab when mode changes (e.g. from config restore)
            useEffect(() => {
                const ownerGroup = MODE_GROUPS.find(g => g.modes.some(m => m.id === currentMode.id));

                    setSelectedGroup(ownerGroup.id);

            return (
                <div className="relative min-h-screen flex flex-col items-center justify-center p-4">

                    {/* Background Aura - Primary */}
                    <div
                        className="aura w-96 h-96 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-colors duration-1000"
                        style={{ backgroundColor: isPlaying ? currentMode.color : '#334155' }}
                    ></div>
                    {/* Background Aura - Secondary (offset for depth) */}
                    <div
                        className="aura-secondary w-80 h-80 top-[40%] left-[55%] -translate-x-1/2 -translate-y-1/2 transition-colors duration-[2000ms]"
                        style={{ backgroundColor: isPlaying ? currentMode.color : '#1e293b', opacity: 0.3 }}
                    ></div>

                    {/* Glass Container */}
                    <div className="glass-panel relative w-full max-w-md rounded-3xl p-6 z-10 flex flex-col gap-5">

                        {/* Header */}
                        <header className="flex justify-between items-center">
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-white/90">
                                    🧠 脳波ブースター
                                </h1>
                                <p className="text-[10px] text-white/30 tracking-wider">Gamma Wave Booster Pro</p>
                            </div>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-2 rounded-full hover:bg-white/10 transition-colors">
                                <IconSettings />
                            </button>
                        </header>

                        {/* Timer Display */}
                        <div className="flex flex-col items-center justify-center py-3">
                            <div className="relative">
                                <div className="text-6xl font-mono font-thin tracking-wider text-white">
                                    {isPlaying ? formatTime(Math.max(0, duration - elapsed)) : formatTime(duration)}
                                </div>
                                {isPlaying && (
                                    <div className="absolute -inset-4 rounded-full border border-white/10 pulse-ring pointer-events-none"></div>
                                )}
                            </div>

                            {/* Duration Selectors */}
                            {!isPlaying && (
                                <div className="flex flex-col items-center mt-4 w-full">
                                    <span className="text-[10px] uppercase text-white/40 tracking-widest mb-2">時間設定</span>
                                    <div className="flex gap-2">
                                        {[10, 20, 30, 60, 90].map(m => (
                                            <button
                                                key={m}
                                                onClick={() => setDuration(m * 60)}
                                                className={`text-sm px-3 py-1.5 rounded-lg border transition-all duration-300 ${duration === m * 60
                                                    ? 'bg-white text-black font-bold border-white shadow-[0_0_20px_rgba(255,255,255,0.2)]'
                                                    : 'border-white/15 text-white/50 hover:bg-white/10 hover:text-white hover:border-white/30'
                                                    }`}
                                            >
                                                {m}分
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Current Mode Label */}
                            <div className="text-sm font-semibold tracking-wide pt-3" style={{ color: currentMode.color }}>
                                {currentMode.label}
                                {currentMode.flow && <span className="badge-flow">フロー</span>}
                            </div>
                            <div className="text-xs text-white/30 mt-0.5">
                                {getFreqLabel()}
                            </div>
                        </div>

                        {/* Mode Info Panel - Always visible for selected mode */}
                        <div className="mode-info rounded-xl p-3 text-xs text-white/70 leading-relaxed">
                            <div className="flex items-start gap-2">
                                <span className="text-base mt-0.5" style={{ color: currentMode.color }}>●</span>
                                <span>{getModeDetail(currentMode.id)}</span>
                            </div>
                        </div>

                        {/* Group Selector */}
                        <div>
                            <label className="text-[10px] uppercase text-white/40 tracking-widest mb-2 block">カテゴリ</label>
                            <div className="group-tabs">
                                {MODE_GROUPS.map(group => (
                                    <button
                                        key={group.id}
                                        onClick={() => setSelectedGroup(group.id)}
                                        className={`group-tab ${selectedGroup === group.id ? 'active' : ''}`}
                                        style={selectedGroup === group.id ? { borderColor: group.color + '60', boxShadow: `0 2px 12px ${group.color}20` } : {}}
                                    >
                                        {group.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Mode Selector (filtered by group) */}
                        <div>
                            <label className="text-[10px] uppercase text-white/40 tracking-widest mb-2 block">モード選択</label>
                            <div className="grid grid-cols-1 gap-1.5 max-h-40 overflow-y-auto pr-1">
                                {currentGroupModes.map(mode => (
                                    <button
                                        key={mode.id}
                                        onClick={() => setCurrentMode(mode)}
                                        className={`p-2.5 rounded-xl text-left transition-all duration-200 border ${currentMode.id === mode.id
                                            ? 'bg-white/10 border-white/30 shadow-lg shadow-black/20'
                                            : 'border-transparent hover:bg-white/5 text-white/60 hover:border-white/10'
                                            }`}
                                    >
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: mode.color }}></span>
                                            <span className="text-xs font-semibold" style={{ color: currentMode.id === mode.id ? mode.color : undefined }}>{mode.label}</span>
                                            {mode.flow && <span className="badge-flow">フロー</span>}

                                        <div className="text-[10px] text-white/35 mt-0.5 pl-3.5">{mode.desc}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Environmental Sound Selector */}
                        <div className="flex flex-col gap-2">
                            <div className="flex items-center justify-between">
                                <label className="text-[10px] uppercase text-white/40 tracking-widest">環境音</label>
                                <span className="text-[9px] text-white/25">※ バックグラウンド再生対応</span>
                            </div>
                            <div className="grid grid-cols-4 gap-1.5">
                                {ENV_OPTIONS.map(opt => {
                                    const isBuiltIn = (opt.id === 'stream' || opt.id === 'ocean');
                                    const isCustom = opt.id.startsWith('custom');
                                    const fileInfo = envFiles[opt.id];
                                    const hasFile = fileInfo && fileInfo.name;
                                    const customLabel = hasFile ? fileInfo.name.replace(/\.[^.]+$/, '').slice(0, 8) : opt.label;
                                    const isDisabled = (isCustom || isBuiltIn) && !hasFile && opt.id !== 'none';
                                    return (
                                        <button
                                            key={opt.id}
                                            onClick={() => !isDisabled && setSelectedEnv(opt.id)}
                                            className={`py-1.5 px-1 rounded-lg text-[10px] font-medium border transition-all duration-200 truncate ${selectedEnv === opt.id
                                                ? 'bg-white/10 border-white/25 text-white shadow-sm'
                                                : isDisabled
                                                    ? 'border-white/5 text-white/15 cursor-default'
                                                    : 'border-white/5 text-white/35 hover:bg-white/5 hover:text-white/60'
                                                }`}
                                            title={hasFile ? envFiles[opt.id].name : opt.label}
                                        >
                                            {opt.id === 'none' ? opt.label : (hasFile ? `🎵 ${customLabel}` : `${opt.label}`)}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Volume Mixers */}
                        <div className="space-y-3">
                            <div>
                                <div className="flex justify-between text-[10px] text-white/50 mb-1">
                                    <span>🎧 脳波誘導 音量</span>
                                    <span className="font-mono">{masterVol}%</span>
                                </div>
                                <input
                                    type="range" min="0" max="100"
                                    value={masterVol}
                                    onChange={(e) => setMasterVol(Number(e.target.value))}
                                    className="w-full"
                                />
                            </div>
                            <div>
                                <div className="flex justify-between text-[10px] text-white/50 mb-1">
                                    <span>🌿 環境音 音量</span>
                                    <span className="font-mono">{envVol}%</span>
                                </div>
                                <input
                                    type="range" min="0" max="100"
                                    value={envVol}
                                    onChange={(e) => setEnvVol(Number(e.target.value))}
                                    className="w-full"
                                />
                            </div>
                        </div>

                        {/* Main Action Button */}
                        <div className="flex justify-center pt-1 pb-2">
                            <div className="relative">
                                {isPlaying && (
                                    <div className="absolute inset-0 rounded-full pulse-ring" style={{ borderColor: currentMode.color, borderWidth: '2px', borderStyle: 'solid' }}></div>
                                )}
                                <button
                                    onClick={togglePlay}
                                    className={`relative btn-glow p-5 rounded-full transition-all duration-500 transform hover:scale-105 active:scale-95 ${isPlaying ? 'text-white' : 'bg-white/10 text-white'
                                        }`}
                                    style={{
                                        boxShadow: isPlaying ? `0 0 40px ${currentMode.color}50, inset 0 0 20px ${currentMode.color}20` : '0 0 20px rgba(255,255,255,0.05)',
                                        border: `2px solid ${isPlaying ? currentMode.color : 'rgba(255,255,255,0.1)'}`,
                                        background: isPlaying ? `radial-gradient(circle, ${currentMode.color}30 0%, transparent 70%)` : undefined
                                    }}
                                >
                                    {isPlaying ? <IconPause /> : <IconPlay />}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Save Toast */}
                    {toastMsg && (
                        <div className="save-toast">
                            <div className="px-5 py-2.5 rounded-full text-sm font-semibold text-white shadow-2xl"
                                style={{ background: 'linear-gradient(135deg, rgba(16,185,129,0.9) 0%, rgba(6,182,212,0.9) 100%)', backdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.2)' }}>
                                {toastMsg}
                            </div>
                        </div>
                    )}

                    {/* Settings Modal (Portal) */}
                    <SettingsModal
                        show={showSettings}
                        onClose={() => setShowSettings(false)}
                        envFiles={envFiles}
                        setEnvFiles={setEnvFiles}
                        onExport={exportSettings}
                        onImport={importSettings}
                        customFolderFiles={customFolderFiles}
                        setCustomFolderFiles={setCustomFolderFiles}
                    />



                    {/* Debug Console (Hidden by default, toggle with 'D') */}
                    <DebugConsole />
                </div>
            );
        }

        // --- バックグラウンド再生維持: visibilitychange対策 ---
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // ページが非表示になった時: メディア要素の再生を維持
                const contexts = document.querySelectorAll('video, audio');
                contexts.forEach(el => {
                    if (el.paused && el.dataset.wasPlaying === 'true') {
                        el.play().catch(() => { });
                    }
                });
            } else {
                // ページが再表示された時: AudioContextとWake Lockを復旧
                // 一時停止されたメディア要素を再生
                const mediaElements = document.querySelectorAll('video, audio');
                mediaElements.forEach(el => {
                    if (el.paused && el.dataset.wasPlaying === 'true') {
                        el.play().catch(() => { });
                    }
                });

                // Wake Lockの再取得（ページが再表示されるとWake Lockは自動解放される）
                // window.__gammaIsPlaying はReact内のstartSession/stopSessionで管理
                if ('wakeLock' in navigator && window.__gammaIsPlaying) {
                    navigator.wakeLock.request('screen').catch(() => { });
                }
            }
        });

        // メディア要素の再生状態をトラッキング
        document.addEventListener('play', (e) => {
            if (e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO') {
                e.target.dataset.wasPlaying = 'true';
            }
        }, true);

        document.addEventListener('pause', (e) => {
            if (e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO') {
                // ユーザーが意図的に停止した場合のみフラグを消す
                if (!document.hidden) {
                    e.target.dataset.wasPlaying = 'false';
                }
            }
        }, true);

        // --- Debug Console Component ---
        // [LOW-6修正] デバッグコンソールをlocalhost開発環境に限定し、本番アプリでは表示しない
        const IS_DEV = window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1' ||
            window.location.protocol === 'file:';

        const DebugConsole = () => {
            // 本番環境では完全に非表示
            if (!IS_DEV) return null;

            const [visible, setVisible] = useState(false);
            const [logs, setLogs] = useState([]);

            useEffect(() => {
                const handler = (e) => {
                    if (e.key === 'd' || e.key === 'D') setVisible(prev => !prev);
                };
                window.addEventListener('keydown', handler);

                const updateLogs = () => setLogs([...debugLogs]);
                window.addEventListener('debug-update', updateLogs);

                return () => {
                    window.removeEventListener('keydown', handler);
                    window.removeEventListener('debug-update', updateLogs);
                };
            }, []);

            if (!visible) return <div className="fixed bottom-0 right-0 p-2 text-xs text-white/20 cursor-pointer" onClick={() => setVisible(true)}>Debug (Press 'D')</div>;

            return (
                <div className="fixed bottom-0 left-0 right-0 h-48 bg-black/90 text-green-400 font-mono text-xs overflow-y-auto p-2 z-[10000] border-t border-white/20">
                    <div className="flex justify-between mb-1 sticky top-0 bg-black/90">
                        <span>Debug Console</span>
                        <button onClick={() => setVisible(false)}>X</button>
                    </div>
                    {logs.map((l, i) => <div key={i}>{l}</div>)}
                </div>
            );
        };

        // --- Error Boundary for debugging ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                this.setState({ errorInfo });
                console.error('React Error Boundary caught:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', {
                        style: { padding: '40px', background: '#1a0000', color: '#ff6b6b', minHeight: '100vh', fontFamily: 'monospace' }
                    },
                        React.createElement('h1', null, '⚠️ アプリケーションエラー'),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', fontSize: '14px', marginTop: '20px', color: '#ffaaaa' } },
                            this.state.error && this.state.error.toString()
                        ),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', fontSize: '12px', marginTop: '10px', color: '#ff8888' } },
                            this.state.errorInfo && this.state.errorInfo.componentStack
                        ),
                        React.createElement('button', {
                            onClick: () => { localStorage.removeItem('gamma_config'); window.location.reload(); },
                            style: { marginTop: '20px', padding: '10px 20px', background: '#ff4444', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontSize: '14px' }
                        }, '🔄 設定をリセットして再読み込み')
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>

    <!-- Service Worker 登録 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>

</body>

</html>
